[alembic]
script_location = %(here)s/src/tutor/db/alembic
prepend_sys_path = %(here)s/src

# Online migrations use DATABASE_URL through env.py so credentials are never
# committed to this file.  Programmatic migrations pass an existing bounded
# SQLAlchemy connection instead.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
